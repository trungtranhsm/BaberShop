  .nav-item.active {

  }
  .stat-card:hover { border-color: #3A3A50; transform: translateY(-1px); }

  .loading-spinner { animation: spin 0.9s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.22s ease forwards; }

  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: #16161D; }
  ::-webkit-scrollbar-thumb { background: #2A2A38; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #3A3A50; }

  @media (max-width: 768px) {
    #sidebar { transform: translateX(-100%); }
    #sidebar.open { transform: translateX(0); }
    #main-content { margin-left: 0 !important; }
  }

<script>
// ========== MOBILE SIDEBAR ==========
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('sidebarOverlay');
  sidebar.classList.toggle('open');
  overlay.classList.toggle('hidden');
}

// ========== APP CACHE ==========
window.AppCache = {
  data: { appointments: [], services: [], staff: [], customers: [], stats: {} },
  isLoaded: false,
  loadedAt: null,

  async init() {
    this.updateLoadingStatus('Đang tải dữ liệu từ server...');
    try {
      const result = await this.callServerFunction('initializeAllData');
      if (!result || typeof result !== 'object' || result.error) {
        throw new Error(result ? result.error : 'Server returned invalid data');
      }
      this.data = {
        appointments: Array.isArray(result.appointments) ? result.appointments : [],
        services:     Array.isArray(result.services)     ? result.services     : [],
        staff:        Array.isArray(result.staff)        ? result.staff        : [],
        customers:    Array.isArray(result.customers)    ? result.customers    : [],
        stats: result.stats || {}
      };
      this.isLoaded = true;
      this.loadedAt = new Date();
      this.updateCacheStatus();
      return true;
    } catch (error) {
      this.updateLoadingStatus('Lỗi: ' + error.message);
      showToast('Lỗi tải dữ liệu: ' + error.message, 'error');
      return false;
    }
  },

  callServerFunction(functionName, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(reject)
        [functionName](...args);
    });
  },

  updateLoadingStatus(message) {
    const el = document.getElementById('loadingStatus');
    if (el) el.textContent = message;
  },

  updateCacheStatus() {
    const el = document.getElementById('cacheStatus');
    if (el && this.isLoaded) {
      const sec = Math.floor((Date.now() - this.loadedAt.getTime()) / 1000);
      el.textContent = `Dữ liệu: ${sec < 60 ? sec + 's' : Math.floor(sec/60) + 'm'} trước`;
    }
  },

  getData(type) {
    if (!this.isLoaded) return [];
    return this.data[type] || [];
  },

  async refresh() {
    return await this.init();
  }
};

// ========== TAB MANAGEMENT ==========
const TabManager = {
  currentTab: 'home',
  init() {
    document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        const tabId = btn.dataset.tab;
        const title = btn.dataset.title || tabId;
        this.switchTo(tabId, title);
        // close mobile sidebar
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.add('hidden');
      });
    });
  },
  switchTo(tabName, title) {
    if (this.currentTab === tabName) return;

    document.querySelectorAll('.nav-item[data-tab]').forEach(btn => {
      btn.classList.remove('active');
      btn.classList.add('text-[#94A3B8]');
      btn.classList.remove('text-[#F1F5F9]');
    });

    const activeBtn = document.querySelector(`.nav-item[data-tab="${tabName}"]`);
    if (activeBtn) {
      activeBtn.classList.add('active');
      activeBtn.classList.remove('text-[#94A3B8]');
    }

    document.querySelectorAll('.tab-content').forEach(c => { c.style.display = 'none'; c.classList.remove('active'); });

    const activeContent = document.getElementById(tabName + 'Content');
    if (activeContent) {
      activeContent.style.display = 'block';
      activeContent.classList.add('active', 'fade-in');
    }

    const pageTitle = document.getElementById('pageTitle');
    if (pageTitle && title) pageTitle.textContent = title;

    this.currentTab = tabName;
  }
};

// ========== DASHBOARD ==========
function updateDashboard() {
  if (!AppCache.isLoaded) return;

  const appointments = AppCache.getData('appointments');
  const customers    = AppCache.getData('customers');
  const staff        = AppCache.getData('staff');
  const services     = AppCache.getData('services');

  const servicePriceMap = new Map(services.map(s => [s.name, s.price]));

  const today = new Date();
  const todayISO = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

  const todayApts  = appointments.filter(a => a.date === todayISO);
  const doneToday  = todayApts.filter(a => a.status === 'Hoàn thành');
  const activeStaff = staff.filter(s => s.status === 'Đang làm');

  const todayRevenue = doneToday.reduce((total, apt) => {
    return total + (apt.service || '').split(',').map(s => s.trim()).reduce((sum, n) => sum + (servicePriceMap.get(n) || 0), 0);
  }, 0);

  document.getElementById('todayAppointments').textContent = todayApts.length;
  document.getElementById('todayRevenue').textContent      = formatCurrency(todayRevenue);
  document.getElementById('totalCustomers').textContent    = customers.length;
  document.getElementById('totalStaff').textContent        = activeStaff.length;

  const sorted = [...appointments].sort((a,b) => new Date(b.date+'T'+b.time) - new Date(a.date+'T'+a.time));
  renderRecentAppointments(sorted.slice(0, 6));
}

function renderRecentAppointments(apts) {
  const container = document.getElementById('recentAppointments');
  if (!apts.length) {
    container.innerHTML = `
      <div class="text-center py-10">
        <p class="text-sm text-[#64748B]">Chưa có lịch hẹn nào</p>
        <button onclick="switchToTab('booking')" class="mt-2 text-xs font-medium text-[#D97706] hover:text-[#FCD34D] cursor-pointer transition-colors">
          Tạo lịch hẹn đầu tiên →
        </button>
      </div>`;
    return;
  }

  const statusInfo = {
    'Hoàn thành':     { cls: 'badge-done',     label: 'Hoàn thành' },
    'Đã hủy':        { cls: 'badge-canceled',  label: 'Đã hủy' },
    'Đang thực hiện': { cls: 'badge-doing',     label: 'Đang thực hiện' },
  };

  container.innerHTML = apts.map(apt => {
    const si = statusInfo[apt.status] || { cls: 'badge-pending', label: apt.status || 'Đã đặt' };
    return `
    <div class="flex items-center justify-between px-5 py-3 hover:bg-[#1E1E2A] transition-colors">
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">${apt.customerName || 'N/A'}</p>
        <p class="text-xs text-[#64748B] truncate">${apt.service || ''} · ${apt.date || ''} ${apt.time || ''}</p>
      </div>
      <span class="ml-3 text-xs font-medium px-2 py-0.5 rounded-full flex-shrink-0 ${si.cls}">${si.label}</span>
    </div>`;
  }).join('');
}

// ========== UTILITIES ==========
function getStatusColor(status) {
  const map = { 'Hoàn thành': 'text-[#4ADE80]', 'Đã hủy': 'text-[#F87171]', 'Đang thực hiện': 'text-[#818CF8]' };
  return map[status] || 'text-[#FBBF24]';
}

function formatCurrency(amount) {
  return new Intl.NumberFormat('vi-VN', { style: 'currency', currency: 'VND' }).format(amount);
}

function updateTime() {
  const el = document.getElementById('currentTime');
  if (el) el.textContent = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
}

function showToast(message, type = 'success') {
  const toast = document.getElementById('toast');
  const inner = document.getElementById('toastInner');
  const icon  = document.getElementById('toastIcon');
  const msg   = document.getElementById('toastMessage');

  const config = {
    success: {
      cls: 'bg-[#16161D] border-[#22C55E]/30 text-[#4ADE80]',
      svg: `<svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
    },
    error: {
      cls: 'bg-[#16161D] border-[#EF4444]/30 text-[#F87171]',
      svg: `<svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>`
    },
    info: {
      cls: 'bg-[#16161D] border-[#6366F1]/30 text-[#818CF8]',
      svg: `<svg fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`
    }
  };

  const c = config[type] || config.info;
  inner.className = `flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl border text-sm font-medium min-w-[240px] max-w-sm ${c.cls}`;
  icon.innerHTML  = c.svg;
  msg.textContent = message;

  toast.classList.remove('hidden');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.add('hidden'), 3500);
}

function showLoading() { document.getElementById('loadingScreen').classList.remove('hidden'); }
function hideLoading()  { document.getElementById('loadingScreen').classList.add('hidden'); }
function switchToTab(tabName) { TabManager.switchTo(tabName, document.querySelector(`.nav-item[data-tab="${tabName}"]`)?.dataset.title); }

// ========== INIT ==========
async function initApp() {
  setInterval(updateTime, 1000);
  updateTime();
  TabManager.init();

  const ok = await AppCache.init();
  if (ok) {
    updateDashboard();
    if (typeof window.initAppointmentManagerTab === 'function') window.initAppointmentManagerTab();
    if (typeof window.initRevenueTab           === 'function') window.initRevenueTab();
    if (typeof window.initCustomerTab          === 'function') window.initCustomerTab();
    setInterval(() => AppCache.updateCacheStatus(), 30000);
    showToast('Ứng dụng đã sẵn sàng!', 'success');
  } else {
    showToast('Lỗi khởi tạo ứng dụng', 'error');
  }
  hideLoading();
}

document.addEventListener('DOMContentLoaded', initApp);

window.AppCache       = AppCache;
window.TabManager     = TabManager;
window.showToast      = showToast;
window.formatCurrency = formatCurrency;
window.switchToTab    = switchToTab;
window.updateDashboard = updateDashboard;
</script>
</body>
