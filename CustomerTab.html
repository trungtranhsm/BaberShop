<div class="space-y-5">
  <!-- Header -->
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl p-4">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-3">
      <h2 class="text-base font-semibold" data-i18n="cust.title">Quản lý khách hàng</h2>
      <div class="relative w-full md:w-72">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#64748B] pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="search" id="customer-search-input" placeholder="Tìm theo tên hoặc SĐT..." data-i18n-placeholder="cust.searchPlaceholder"
          class="w-full pl-9 pr-4 py-2 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] placeholder-[#475569] outline-none transition-colors">
      </div>
    </div>
  </div>

  <!-- Phone History Lookup -->
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl p-5">
    <div class="flex items-center gap-3 mb-4">
      <div class="w-9 h-9 rounded-xl bg-[#6366F1]/15 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-[#6366F1]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 1.27h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.91a16 16 0 0 0 6.29 6.29l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div>
        <p class="text-sm font-semibold" data-i18n="cust.lookupTitle">Tra cứu lịch sử theo SĐT</p>
        <p class="text-xs text-[#64748B]" data-i18n="cust.lookupDesc">Nhập số điện thoại để xem toàn bộ lịch sử đặt lịch</p>
      </div>
    </div>
    <div class="relative">
      <div class="flex gap-2">
        <div class="relative flex-1">
          <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-[#64748B] pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="tel" id="phone-lookup-input" placeholder="VD: 0901234567" data-i18n-placeholder="cust.phonePlaceholder"
            autocomplete="off"
            class="w-full pl-9 pr-4 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] placeholder-[#475569] outline-none transition-colors">
          <!-- Autocomplete dropdown -->
          <div id="phone-lookup-suggestions" class="absolute top-full left-0 right-0 mt-1 bg-[#1E1E2A] border border-[#2A2A38] rounded-lg shadow-xl z-20 overflow-hidden" style="display:none;"></div>
        </div>
        <button id="phone-lookup-btn"
          class="px-4 py-2.5 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm font-medium rounded-lg cursor-pointer transition-colors flex items-center gap-2 flex-shrink-0">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span data-i18n="cust.lookupBtn">Tra cứu</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Table -->
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="min-w-full">
        <thead>
          <tr class="border-b border-[#2A2A38]">
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="booking.customerNameLabel">Tên khách hàng</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="booking.phoneLabel">Số điện thoại</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="cust.joinedDate">Ngày tham gia</th>
            <th class="px-5 py-3 text-right text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="common.actions">Hành động</th>
          </tr>
        </thead>
        <tbody id="customer-list-body" class="divide-y divide-[#2A2A38]">
          <tr><td colspan="4" class="px-5 py-8 text-center text-sm text-[#64748B]" data-i18n="common.loading">Đang tải...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== CUSTOMER DETAILS MODAL ===== -->
<div id="customer-details-modal" class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50" style="display:none;">
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-2xl shadow-2xl p-6 w-full max-w-2xl mx-4 max-h-[90vh] flex flex-col">
    <div class="flex items-center justify-between mb-5 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-xl bg-[#D97706]/15 flex items-center justify-center">
          <svg class="w-5 h-5 text-[#D97706]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div>
          <h3 id="details-modal-title" class="text-lg font-bold" data-i18n="cust.detailsTitle">Chi tiết khách hàng</h3>
          <p id="details-phone" class="text-xs text-[#64748B]"></p>
        </div>
      </div>
      <button id="close-details-modal-btn" class="w-8 h-8 rounded-lg bg-[#1E1E2A] hover:bg-[#2A2A38] flex items-center justify-center cursor-pointer transition-colors text-[#94A3B8] hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-2 gap-3 mb-5 flex-shrink-0">
      <div class="bg-[#1E1E2A] border border-[#2A2A38] rounded-xl p-4">
        <p class="text-xs text-[#64748B] mb-1" data-i18n="cust.totalSpend">Tổng chi tiêu</p>
        <p id="details-totalSpend" class="text-xl font-bold text-[#4ADE80]" data-i18n="cust.calculating">Đang tính...</p>
      </div>
      <div class="bg-[#1E1E2A] border border-[#2A2A38] rounded-xl p-4">
        <p class="text-xs text-[#64748B] mb-1" data-i18n="cust.lastVisit">Lần ghé cuối</p>
        <p id="details-lastVisit" class="text-xl font-bold" data-i18n="common.loading">Đang tải...</p>
      </div>
    </div>

    <!-- History -->
    <div class="flex-1 overflow-hidden flex flex-col">
      <h4 class="text-sm font-semibold mb-3 flex-shrink-0" data-i18n="cust.bookingHistory">Lịch sử lịch hẹn</h4>
      <div id="details-history-container" class="flex-1 overflow-y-auto bg-[#1E1E2A] border border-[#2A2A38] rounded-xl">
        <p class="p-4 text-center text-sm text-[#64748B]" data-i18n="cust.loadingHistory">Đang tải lịch sử...</p>
      </div>
    </div>
  </div>
</div>

<script>
(function() {
  let allCustomers = [];
  const searchInput    = document.getElementById('customer-search-input');
  const listBody       = document.getElementById('customer-list-body');
  const detailsModal   = document.getElementById('customer-details-modal');
  const closeDetailsBtn = document.getElementById('close-details-modal-btn');

  function renderCustomers(customers) {
    if (!customers || !customers.length) {
      const msg = window.currentLanguage === 'vi' ? 'Không có khách hàng nào.' : 'No customers found.';
      listBody.innerHTML = `<tr><td colspan="4" class="px-5 py-8 text-center text-sm text-[#64748B]">${msg}</td></tr>`;
      return;
    }
    const labelDetails = window.currentLanguage === 'vi' ? 'Xem chi tiết' : 'View details';
    const ce = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    listBody.innerHTML = customers.map(c => `
      <tr class="hover:bg-[#1E1E2A] transition-colors">
        <td class="px-5 py-3.5 text-sm font-medium">${ce(c.name)}</td>
        <td class="px-5 py-3.5 text-sm text-[#94A3B8]">${ce(c.phone)}</td>
        <td class="px-5 py-3.5 text-sm text-[#94A3B8]">${ce(c.createdDate) || 'N/A'}</td>
        <td class="px-5 py-3.5 text-right">
          <button class="view-details-btn flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-[#D97706] bg-[#D97706]/10 hover:bg-[#D97706]/20 rounded-lg cursor-pointer transition-colors ml-auto"
            data-phone="${ce(c.phone)}" data-name="${ce(c.name)}">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            ${labelDetails}
          </button>
        </td>
      </tr>`).join('');
  }

  function filterAndRender() {
    const q = searchInput.value.toLowerCase();
    renderCustomers(q ? allCustomers.filter(c => c.name.toLowerCase().includes(q) || c.phone.toString().includes(q)) : allCustomers);
  }

  async function showDetailsModal(phone, name) {
    document.getElementById('details-modal-title').textContent = name;
    document.getElementById('details-phone').textContent = phone;
    document.getElementById('details-totalSpend').textContent = window.currentLanguage === 'vi' ? 'Đang tính...' : 'Calculating...';
    document.getElementById('details-lastVisit').textContent  = window.currentLanguage === 'vi' ? 'Đang tải...' : 'Loading...';
    
    const loadingHistoryMsg = window.currentLanguage === 'vi' ? 'Đang tải lịch sử...' : 'Loading history...';
    document.getElementById('details-history-container').innerHTML = `<p class="p-4 text-center text-sm text-[#64748B]">${loadingHistoryMsg}</p>`;
    detailsModal.style.display = 'flex';

    try {
      const result = await AppCache.callServerFunction('getCustomerDetailsWithStats', phone, AppCache._emailToken);
      if (!result.success) throw new Error(result.error);
      const d = result.data;
      document.getElementById('details-totalSpend').textContent = formatCurrency(d.totalSpend);
      document.getElementById('details-lastVisit').textContent  = d.lastVisit || (window.currentLanguage === 'vi' ? 'Chưa có' : 'None');

      const hist = document.getElementById('details-history-container');
      if (!d.appointmentHistory || !d.appointmentHistory.length) {
        const noHistoryMsg = window.currentLanguage === 'vi' ? 'Không có lịch sử.' : 'No history.';
        hist.innerHTML = `<p class="p-4 text-center text-sm text-[#64748B]">${noHistoryMsg}</p>`;
      } else {
        const statusMap = { 'Hoàn thành': 'badge-done', 'Đã hủy': 'badge-canceled' };
        const labelDate = window.currentLanguage === 'vi' ? 'Ngày' : 'Date';
        const labelService = window.currentLanguage === 'vi' ? 'Dịch vụ' : 'Service';
        const labelStatus = window.currentLanguage === 'vi' ? 'Trạng thái' : 'Status';
        hist.innerHTML = `
          <table class="min-w-full">
            <thead class="border-b border-[#2A2A38] sticky top-0 bg-[#1E1E2A]">
              <tr>
                <th class="px-4 py-2.5 text-left text-xs font-medium text-[#64748B]">${labelDate}</th>
                <th class="px-4 py-2.5 text-left text-xs font-medium text-[#64748B]">${labelService}</th>
                <th class="px-4 py-2.5 text-left text-xs font-medium text-[#64748B]">${labelStatus}</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-[#2A2A38]">
              ${d.appointmentHistory.map(a => {
                const he = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
                return `<tr>
                  <td class="px-4 py-2.5 text-sm text-[#94A3B8]">${he(a.date)}</td>
                  <td class="px-4 py-2.5 text-sm">${he(a.service)}</td>
                  <td class="px-4 py-2.5">
                    <span class="text-xs font-medium px-2 py-0.5 rounded-full ${statusMap[a.status] || 'badge-pending'}">${he(a.status)}</span>
                  </td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>`;
      }
    } catch (err) {
      const loadErrorMsg = window.currentLanguage === 'vi' ? 'Lỗi tải chi tiết: ' : 'Error loading details: ';
      showToast(loadErrorMsg + err.message, 'error');
      const errHistMsg = window.currentLanguage === 'vi' ? 'Lỗi tải lịch sử.' : 'Error loading history.';
      document.getElementById('details-history-container').innerHTML = `<p class="p-4 text-center text-sm text-[#F87171]">${errHistMsg}</p>`;
    }
  }

  // ── Phone lookup ─────────────────────────────────────────────────
  const phoneLookupInput   = document.getElementById('phone-lookup-input');
  const phoneLookupBtn     = document.getElementById('phone-lookup-btn');
  const phoneSuggestions   = document.getElementById('phone-lookup-suggestions');

  function renderSuggestions(matches) {
    if (!matches.length) { phoneSuggestions.style.display = 'none'; return; }
    const ce = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    phoneSuggestions.innerHTML = matches.slice(0, 6).map(c => `
      <div class="suggestion-item flex items-center justify-between px-4 py-2.5 hover:bg-[#2A2A38] cursor-pointer transition-colors"
           data-phone="${ce(c.phone)}" data-name="${ce(c.name)}">
        <span class="text-sm font-medium">${ce(c.name)}</span>
        <span class="text-xs text-[#64748B] font-mono">${ce(c.phone)}</span>
      </div>`).join('');
    phoneSuggestions.style.display = 'block';
  }

  function hideSuggestions() {
    setTimeout(() => { phoneSuggestions.style.display = 'none'; }, 150);
  }

  function doPhoneLookup() {
    const phone = phoneLookupInput.value.trim();
    if (!phone) {
      const enterPhoneMsg = window.currentLanguage === 'vi' ? 'Vui lòng nhập số điện thoại' : 'Please enter phone number';
      showToast(enterPhoneMsg, 'error');
      return;
    }
    phoneSuggestions.style.display = 'none';
    const matched = allCustomers.find(c => String(c.phone).replace(/\s/g,'') === phone.replace(/\s/g,''));
    const guestLabel = window.currentLanguage === 'vi' ? 'Khách vãng lai' : 'Walk-in Customer';
    showDetailsModal(phone, matched ? matched.name : guestLabel);
  }

  window.initCustomerTab = function() {
    allCustomers = AppCache.getData('customers').sort((a,b) => a.name.localeCompare(b.name));
    renderCustomers(allCustomers);

    // Table search
    searchInput.addEventListener('input', filterAndRender);

    // Modal close
    closeDetailsBtn.addEventListener('click', () => detailsModal.style.display = 'none');
    detailsModal.addEventListener('click', e => { if (e.target === detailsModal) detailsModal.style.display = 'none'; });

    // Table row click
    listBody.addEventListener('click', e => {
      const btn = e.target.closest('.view-details-btn');
      if (btn) showDetailsModal(btn.dataset.phone, btn.dataset.name);
    });

    // Phone lookup – suggestions while typing
    phoneLookupInput.addEventListener('input', () => {
      const q = phoneLookupInput.value.trim();
      if (!q) { phoneSuggestions.style.display = 'none'; return; }
      const matches = allCustomers.filter(c => String(c.phone).includes(q) || c.name.toLowerCase().includes(q.toLowerCase()));
      renderSuggestions(matches);
    });

    // Phone lookup – select suggestion
    phoneSuggestions.addEventListener('click', e => {
      const item = e.target.closest('.suggestion-item');
      if (!item) return;
      phoneLookupInput.value = item.dataset.phone;
      phoneSuggestions.style.display = 'none';
      showDetailsModal(item.dataset.phone, item.dataset.name);
    });

    // Phone lookup – button & Enter
    phoneLookupBtn.addEventListener('click', doPhoneLookup);
    phoneLookupInput.addEventListener('keydown', e => { if (e.key === 'Enter') doPhoneLookup(); });
    phoneLookupInput.addEventListener('blur', hideSuggestions);
  };
})();
</script>
