<div class="space-y-5">
  <!-- Header -->
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl p-4">
    <div class="flex flex-col sm:flex-row gap-3 items-start sm:items-center justify-between">
      <h2 class="text-base font-semibold" data-i18n="st.managerTitle">Nhân viên &amp; Dịch vụ</h2>
      <div class="flex gap-2">
        <button onclick="showAddStaffForm()"
          class="flex items-center gap-2 px-4 py-2 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm font-medium rounded-lg transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="st.addStaffBtn">Thêm nhân viên</span>
        </button>
        <button onclick="showAddServiceForm()"
          class="flex items-center gap-2 px-4 py-2 bg-[#22C55E] hover:bg-[#16A34A] text-white text-sm font-medium rounded-lg transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span data-i18n="st.addServiceBtn">Thêm dịch vụ</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Staff Table -->
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl overflow-hidden">
    <div class="px-5 py-3.5 border-b border-[#2A2A38]">
      <h3 class="text-sm font-semibold" data-i18n="st.staffListTitle">Danh sách nhân viên</h3>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full">
        <thead>
          <tr class="border-b border-[#2A2A38]">
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thID">ID</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thName">Tên nhân viên</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thSpecialty">Chuyên môn</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thStatus">Trạng thái</th>
            <th class="px-5 py-3 text-right text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thAction">Thao tác</th>
          </tr>
        </thead>
        <tbody id="staffTableBody" class="divide-y divide-[#2A2A38]">
          <tr><td colspan="5" class="px-5 py-8 text-center text-sm text-[#64748B]" data-i18n="common.loading">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Services Table -->
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl overflow-hidden">
    <div class="px-5 py-3.5 border-b border-[#2A2A38]">
      <h3 class="text-sm font-semibold" data-i18n="st.serviceListTitle">Danh sách dịch vụ</h3>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full">
        <thead>
          <tr class="border-b border-[#2A2A38]">
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thID">ID</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="st.thServiceName">Tên dịch vụ</th>
            <th class="px-5 py-3 text-left text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="st.thPrice">Giá</th>
            <th class="px-5 py-3 text-right text-xs font-medium text-[#64748B] uppercase tracking-wider" data-i18n="staff.thAction">Thao tác</th>
          </tr>
        </thead>
        <tbody id="serviceTableBody" class="divide-y divide-[#2A2A38]">
          <tr><td colspan="4" class="px-5 py-8 text-center text-sm text-[#64748B]" data-i18n="common.loading">Đang tải dữ liệu...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ===== ADD STAFF MODAL ===== -->
<div id="staffModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold" data-i18n="st.addStaffTitle">Thêm nhân viên mới</h3>
      <button onclick="hideStaffModal()" class="w-8 h-8 rounded-lg bg-[#1E1E2A] hover:bg-[#2A2A38] flex items-center justify-center cursor-pointer transition-colors text-[#94A3B8] hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="staffForm" class="space-y-4">
      <div>
        <label for="staffName" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="st.nameLabel">Tên nhân viên *</label>
        <input type="text" id="staffName" required placeholder="Nguyễn Văn A"
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm outline-none transition-colors placeholder-[#475569]">
      </div>
      <div>
        <label for="staffSpecialty" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="st.specialtyLabel">Chuyên môn</label>
        <input type="text" id="staffSpecialty" placeholder="Cắt tóc, nhuộm..."
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm outline-none transition-colors placeholder-[#475569]">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="hideStaffModal()" class="flex-1 px-4 py-2.5 bg-[#1E1E2A] hover:bg-[#252533] border border-[#2A2A38] text-sm font-medium rounded-lg cursor-pointer transition-colors" data-i18n="common.cancel">Hủy</button>
        <button type="submit" id="submitStaffBtn" class="flex-1 px-4 py-2.5 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm font-bold rounded-lg cursor-pointer transition-colors" data-i18n="st.addStaffBtn">Thêm nhân viên</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== ADD SERVICE MODAL ===== -->
<div id="serviceModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden items-center justify-center z-50">
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-2xl shadow-2xl p-6 w-full max-w-md mx-4">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold" data-i18n="st.addServiceTitle">Thêm dịch vụ mới</h3>
      <button onclick="hideServiceModal()" class="w-8 h-8 rounded-lg bg-[#1E1E2A] hover:bg-[#2A2A38] flex items-center justify-center cursor-pointer transition-colors text-[#94A3B8] hover:text-white">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form id="serviceForm" class="space-y-4">
      <div>
        <label for="serviceName" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="st.serviceNameLabel">Tên dịch vụ *</label>
        <input type="text" id="serviceName" required placeholder="Cắt tóc nam"
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#22C55E] rounded-lg text-sm outline-none transition-colors placeholder-[#475569]">
      </div>
      <div>
        <label for="servicePrice" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="st.priceLabel">Giá (VND) *</label>
        <input type="number" id="servicePrice" required min="0" placeholder="50000"
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#22C55E] rounded-lg text-sm outline-none transition-colors placeholder-[#475569]">
      </div>
      <div class="flex gap-3 pt-2">
        <button type="button" onclick="hideServiceModal()" class="flex-1 px-4 py-2.5 bg-[#1E1E2A] hover:bg-[#252533] border border-[#2A2A38] text-sm font-medium rounded-lg cursor-pointer transition-colors" data-i18n="common.cancel">Hủy</button>
        <button type="submit" id="submitServiceBtn" class="flex-1 px-4 py-2.5 bg-[#22C55E] hover:bg-[#16A34A] text-white text-sm font-bold rounded-lg cursor-pointer transition-colors" data-i18n="st.addServiceBtn">Thêm dịch vụ</button>
      </div>
    </form>
  </div>
</div>

<script>
const _esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

window.initStaffTab = function() { loadStaffAndServices(); };

function loadStaffAndServices() {
  const staffData   = window.AppCache ? window.AppCache.getData('staff')    : [];
  const serviceData = window.AppCache ? window.AppCache.getData('services') : [];
  displayStaff(staffData);
  displayServices(serviceData);
}

function displayStaff(staff) {
  const tbody = document.getElementById('staffTableBody');
  if (!staff || !staff.length) {
    const noStaffMsg = window.currentLanguage === 'vi' ? 'Chưa có nhân viên nào' : 'No staff members found';
    tbody.innerHTML = `<tr><td colspan="5" class="px-5 py-8 text-center text-sm text-[#64748B]">${noStaffMsg}</td></tr>`;
    return;
  }
  const isVi = window.currentLanguage === 'vi';
  const labelWorking = isVi ? 'Đang làm' : 'Working';
  const labelResigned = isVi ? 'Nghỉ việc' : 'Resigned';
  const labelUnknown = isVi ? 'Không xác định' : 'Unknown';
  const labelDelete = isVi ? 'Xóa' : 'Delete';

  const statusBadge = s => s === 'Đang làm'
    ? `<span class="text-xs font-medium px-2 py-0.5 rounded-full badge-done">${labelWorking}</span>`
    : `<span class="text-xs font-medium px-2 py-0.5 rounded-full badge-canceled">${labelResigned}</span>`;

  tbody.innerHTML = staff.map(m => `
    <tr class="hover:bg-[#1E1E2A] transition-colors">
      <td class="px-5 py-3.5 text-xs text-[#64748B]">${_esc(m.id || m[0] || '')}</td>
      <td class="px-5 py-3.5 text-sm font-medium">${_esc(m.name || m[1] || '')}</td>
      <td class="px-5 py-3.5 text-sm text-[#94A3B8]">${_esc(m.specialty || m[2] || labelUnknown)}</td>
      <td class="px-5 py-3.5">${statusBadge(m.status || m[3] || '')}</td>
      <td class="px-5 py-3.5 text-right">
        <button onclick="deleteStaff('${_esc(m.id || m[0])}')" class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-[#F87171] bg-[#EF4444]/10 hover:bg-[#EF4444]/20 rounded-lg cursor-pointer transition-colors ml-auto">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          ${labelDelete}
        </button>
      </td>
    </tr>`).join('');
}

function displayServices(services) {
  const tbody = document.getElementById('serviceTableBody');
  if (!services || !services.length) {
    const noServicesMsg = window.currentLanguage === 'vi' ? 'Chưa có dịch vụ nào' : 'No services found';
    tbody.innerHTML = `<tr><td colspan="4" class="px-5 py-8 text-center text-sm text-[#64748B]">${noServicesMsg}</td></tr>`;
    return;
  }
  const isVi = window.currentLanguage === 'vi';
  const labelDelete = isVi ? 'Xóa' : 'Delete';
  
  tbody.innerHTML = services.map(s => `
    <tr class="hover:bg-[#1E1E2A] transition-colors">
      <td class="px-5 py-3.5 text-xs text-[#64748B]">${_esc(s.id || s[0] || '')}</td>
      <td class="px-5 py-3.5 text-sm font-medium">${_esc(s.name || s[1] || '')}</td>
      <td class="px-5 py-3.5 text-sm font-semibold text-[#4ADE80]">${(s.price || s[2] || 0).toLocaleString(isVi ? 'vi-VN' : 'en-US')} đ</td>
      <td class="px-5 py-3.5 text-right">
        <button onclick="deleteService('${_esc(s.id || s[0])}')" class="flex items-center gap-1 px-3 py-1.5 text-xs font-medium text-[#F87171] bg-[#EF4444]/10 hover:bg-[#EF4444]/20 rounded-lg cursor-pointer transition-colors ml-auto">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          ${labelDelete}
        </button>
      </td>
    </tr>`).join('');
}

function showAddStaffForm() {
  const modal = document.getElementById('staffModal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}
function hideStaffModal() {
  const modal = document.getElementById('staffModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  document.getElementById('staffForm').reset();
}
function showAddServiceForm() {
  const modal = document.getElementById('serviceModal');
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}
function hideServiceModal() {
  const modal = document.getElementById('serviceModal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
  document.getElementById('serviceForm').reset();
}

document.getElementById('staffForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitStaffBtn');
  btn.disabled = true; 
  btn.textContent = window.currentLanguage === 'vi' ? 'Đang lưu...' : 'Saving...';
  
  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Thêm nhân viên' : 'Add Staff';
      if (result.success) {
        const successMsg = window.currentLanguage === 'vi' ? 'Thêm nhân viên thành công!' : 'Staff member added successfully!';
        showToast(successMsg, 'success');
        hideStaffModal();
        AppCache.refresh().then(() => loadStaffAndServices());
      } else { showToast(result.error, 'error'); }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Thêm nhân viên' : 'Add Staff';
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + err.message, 'error');
    })
    .addStaff({ name: document.getElementById('staffName').value, specialty: document.getElementById('staffSpecialty').value, _emailToken: window.AppCache && window.AppCache._emailToken });
});

document.getElementById('serviceForm').addEventListener('submit', function(e) {
  e.preventDefault();
  const btn = document.getElementById('submitServiceBtn');
  btn.disabled = true; 
  btn.textContent = window.currentLanguage === 'vi' ? 'Đang lưu...' : 'Saving...';
  
  google.script.run
    .withSuccessHandler(function(result) {
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Thêm dịch vụ' : 'Add Service';
      if (result.success) {
        const successMsg = window.currentLanguage === 'vi' ? 'Thêm dịch vụ thành công!' : 'Service added successfully!';
        showToast(successMsg, 'success');
        hideServiceModal();
        AppCache.refresh().then(() => loadStaffAndServices());
      } else { showToast(result.error, 'error'); }
    })
    .withFailureHandler(function(err) {
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Thêm dịch vụ' : 'Add Service';
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + err.message, 'error');
    })
    .addService({ name: document.getElementById('serviceName').value, price: parseInt(document.getElementById('servicePrice').value), _emailToken: window.AppCache && window.AppCache._emailToken });
});

function deleteStaff(id) {
  const confirmMsg = window.currentLanguage === 'vi' ? 'Bạn có chắc muốn xóa nhân viên này?' : 'Are you sure you want to delete this staff member?';
  if (!confirm(confirmMsg)) return;
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { 
        const successMsg = window.currentLanguage === 'vi' ? 'Đã xóa nhân viên!' : 'Staff member deleted!';
        showToast(successMsg, 'success'); 
        AppCache.refresh().then(() => loadStaffAndServices()); 
      }
      else { showToast(r.error, 'error'); }
    })
    .withFailureHandler(function(e) { 
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + e.message, 'error'); 
    })
    .deleteStaff(id, window.AppCache && window.AppCache._emailToken);
}

function deleteService(id) {
  const confirmMsg = window.currentLanguage === 'vi' ? 'Bạn có chắc muốn xóa dịch vụ này?' : 'Are you sure you want to delete this service?';
  if (!confirm(confirmMsg)) return;
  google.script.run
    .withSuccessHandler(function(r) {
      if (r.success) { 
        const successMsg = window.currentLanguage === 'vi' ? 'Đã xóa dịch vụ!' : 'Service deleted!';
        showToast(successMsg, 'success'); 
        AppCache.refresh().then(() => loadStaffAndServices()); 
      }
      else { showToast(r.error, 'error'); }
    })
    .withFailureHandler(function(e) { 
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + e.message, 'error'); 
    })
    .deleteService(id, window.AppCache && window.AppCache._emailToken);
}
</script>
