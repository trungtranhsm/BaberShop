window.currentLanguage = localStorage.getItem('__app_lang') || 'vi';
window.currentTheme = localStorage.getItem('__app_theme') || 'dark';

window.setAppLanguage = function(lang) {
  window.currentLanguage = lang;
  localStorage.setItem('__app_lang', lang);
  document.documentElement.setAttribute('lang', lang);

  // 1. Translate all data-i18n elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (window.TRANSLATIONS[lang] && window.TRANSLATIONS[lang][key]) {
      el.textContent = window.TRANSLATIONS[lang][key];
    }
  });

  // 2. Translate all placeholders
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (window.TRANSLATIONS[lang] && window.TRANSLATIONS[lang][key]) {
      el.setAttribute('placeholder', window.TRANSLATIONS[lang][key]);
    }
  });

  // 3. Update titles of buttons that change header titles
  document.querySelectorAll('[data-title-key]').forEach(el => {
    const key = el.getAttribute('data-title-key');
    if (window.TRANSLATIONS[lang] && window.TRANSLATIONS[lang][key]) {
      el.setAttribute('data-title', window.TRANSLATIONS[lang][key]);
    }
  });

  // 4. Update the active page title in the header
  const activeBtn = document.querySelector('.nav-item.active');
  if (activeBtn) {
    const pageTitle = document.getElementById('pageTitle');
    if (pageTitle) {
      pageTitle.textContent = activeBtn.getAttribute('data-title') || activeBtn.dataset.title;
    }
  }

  // 5. Update dropdown selectors
  const langSelects = document.querySelectorAll('#languageSelect, #appLanguageSelect');
  langSelects.forEach(s => s.value = lang);

  // Update theme toggle text based on language
  const themeToggleText = document.getElementById('themeToggleText');
  if (themeToggleText) {
    themeToggleText.textContent = window.TRANSLATIONS[lang][window.currentTheme === 'light' ? 'theme.dark' : 'theme.light'];
  }

  // 6. Propagate changes to sub-tabs
  if (typeof window.initAppointmentManagerTab === 'function') window.initAppointmentManagerTab();
  if (typeof window.updateRevenueView === 'function') window.updateRevenueView();
  if (typeof window.initCustomerTab === 'function') window.initCustomerTab();
  if (typeof window.initStaffTab === 'function') window.initStaffTab();
  if (typeof window.updateLogsView === 'function') window.updateLogsView();
  if (typeof window.initSettingsTab === 'function') window.initSettingsTab();
  if (typeof window.updateDashboard === 'function') window.updateDashboard();
};

window.setAppTheme = function(theme) {
  window.currentTheme = theme;
  localStorage.setItem('__app_theme', theme);
  const root = document.documentElement;
  const themeToggleTexts = document.querySelectorAll('#themeToggleText');
  const themeIcons = document.querySelectorAll('#themeIcon');
  const lang = window.currentLanguage;

  if (theme === 'light') {
    root.classList.add('light-mode');
    themeToggleTexts.forEach(t => t.textContent = window.TRANSLATIONS[lang]['theme.dark']);
    themeIcons.forEach(icon => {
      icon.innerHTML = `<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>`;
    });
  } else {
    root.classList.remove('light-mode');
    themeToggleTexts.forEach(t => t.textContent = window.TRANSLATIONS[lang]['theme.light']);
    themeIcons.forEach(icon => {
      icon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>`;
    });
  }

  // Update theme selectors
  const themeSelects = document.querySelectorAll('#appThemeSelect');
  themeSelects.forEach(s => s.value = theme);

  // Redraw revenue chart with new theme colors
  if (typeof window.updateRevenueView === 'function') window.updateRevenueView();
};

window.toggleTheme = function() {
  window.setAppTheme(window.currentTheme === 'light' ? 'dark' : 'light');
};

// Expose standard translator function
window.t = function(key) {
  return (window.TRANSLATIONS[window.currentLanguage] && window.TRANSLATIONS[window.currentLanguage][key]) || key;
};
