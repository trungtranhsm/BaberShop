<div class="space-y-6">
  <div class="bg-[#16161D] border border-[#2A2A38] rounded-xl p-6 max-w-2xl mx-auto">
    <h2 class="text-base font-semibold mb-4 text-[#F1F5F9]" data-i18n="home.createBooking">Tạo lịch hẹn mới</h2>
    <form id="bookingForm" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="customerName" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.customerNameLabel">Tên khách hàng</label>
          <input type="text" id="customerName" name="customerName" required placeholder="Nguyễn Văn A" data-i18n-placeholder="booking.customerNameLabel"
            class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] placeholder-[#475569] outline-none transition-colors">
        </div>
        <div>
          <label for="phone" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.phoneLabel">Số điện thoại</label>
          <input type="tel" id="phone" name="phone" required placeholder="0901..." data-i18n-placeholder="booking.phoneLabel"
            class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] placeholder-[#475569] outline-none transition-colors">
        </div>
      </div>
      
      <div>
        <label for="service" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.serviceLabel">Dịch vụ</label>
        <select id="service" name="service" required
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] outline-none transition-colors">
          <option value="" data-i18n="booking.selectService">Chọn dịch vụ...</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="date" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.dateLabel">Ngày</label>
          <input type="date" id="date" name="date" required
            class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] outline-none transition-colors">
        </div>
        <div>
          <label for="time" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.timeLabel">Giờ</label>
          <input type="time" id="time" name="time" required
            class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] outline-none transition-colors">
        </div>
      </div>

      <div>
        <label for="staff" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.staffLabel">Nhân viên thực hiện</label>
        <select id="staff" name="staff"
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-sm text-[#F1F5F9] outline-none transition-colors">
          <option value="" data-i18n="booking.autoStaff">Tự động chọn</option>
        </select>
      </div>

      <div>
        <label for="notes" class="block text-xs font-medium text-[#94A3B8] mb-1.5" data-i18n="booking.notesLabel">Ghi chú</label>
        <textarea id="notes" name="notes" rows="3" placeholder="..." data-i18n-placeholder="booking.notesPlaceholder"
          class="w-full px-3 py-2.5 bg-[#1E1E2A] border border-[#2A2A38] focus:border-[#6366F1] rounded-lg text-[#F1F5F9] placeholder-[#475569] outline-none transition-colors resize-none"></textarea>
      </div>

      <div>
        <button type="submit" id="submitBookingBtn"
          class="w-full py-2.5 px-4 bg-[#6366F1] hover:bg-[#4F46E5] text-white text-sm font-medium rounded-lg transition-colors cursor-pointer"
          data-i18n="booking.submitBtn">
          Xác nhận đặt lịch
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  function populateServices(services) {
    const select = document.getElementById('service');
    if (!select) return;
    
    select.innerHTML = '<option value="">' + (window.currentLanguage === 'vi' ? 'Chọn dịch vụ...' : 'Select service...') + '</option>';
    
    services.forEach(service => {
      const option = document.createElement('option');
      option.value = service.name;
      option.textContent = `${service.name} - ${service.price.toLocaleString(window.currentLanguage === 'vi' ? 'vi-VN' : 'en-US')} VND`;
      select.appendChild(option);
    });
  }

  function populateStaff(staff) {
    const select = document.getElementById('staff');
    if (!select) return;
    
    select.innerHTML = '<option value="">' + (window.currentLanguage === 'vi' ? 'Tự động chọn' : 'Auto assign') + '</option>';

    staff.forEach(s => {
      const option = document.createElement('option');
      option.value = s.name;
      option.textContent = s.name;
      select.appendChild(option);
    });
  }

  function handleBookingSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submitBookingBtn');
    btn.disabled = true;
    btn.textContent = window.currentLanguage === 'vi' ? 'Đang xử lý...' : 'Processing...';

    const formData = {
      customerName: document.getElementById('customerName').value,
      phone: document.getElementById('phone').value,
      service: document.getElementById('service').value,
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      staff: document.getElementById('staff').value,
      notes: document.getElementById('notes').value
    };

    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.textContent = window.currentLanguage === 'vi' ? 'Xác nhận đặt lịch' : 'Confirm Booking';
        if (response.success) {
          const successMsg = window.currentLanguage === 'vi' 
            ? 'Đặt lịch thành công! ID: ' + response.id
            : 'Booking successful! ID: ' + response.id;
          showToast(successMsg, 'success');
          document.getElementById('bookingForm').reset();
          if (window.AppCache && typeof window.AppCache.refresh === 'function') {
            window.AppCache.refresh();
          }
        } else {
          const errorMsg = window.currentLanguage === 'vi'
            ? 'Lỗi khi đặt lịch: ' + response.error
            : 'Booking error: ' + response.error;
          showToast(errorMsg, 'error');
        }
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.textContent = window.currentLanguage === 'vi' ? 'Xác nhận đặt lịch' : 'Confirm Booking';
        const errorMsg = window.currentLanguage === 'vi'
          ? 'Lỗi hệ thống: ' + error.message
          : 'System error: ' + error.message;
        showToast(errorMsg, 'error');
      })
      .createAppointment(formData);
  }

  window.initHomeTab = function() {
    console.log("🚀 Initializing Booking/Home Tab...");
    const appData = window.AppCache ? window.AppCache.getData() : null;

    if (appData) {
      console.log("✅ Found cached data. Populating form fields.");
      populateServices(appData.services || []);
      populateStaff(appData.staff || []);
    } else {
      console.error("❌ Could not get data from AppCache. Form fields will be empty.");
      const errorMsg = window.currentLanguage === 'vi'
        ? 'Không thể tải dữ liệu Dịch vụ và Nhân viên. Vui lòng thử tải lại trang.'
        : 'Failed to load Services and Staff data. Please try refreshing the page.';
      showToast(errorMsg, 'error');
    }
  };

  (function() {
    const form = document.getElementById('bookingForm');
    if (form) {
      form.addEventListener('submit', handleBookingSubmit);
    }
  })();
</script>
