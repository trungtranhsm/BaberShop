<div class="space-y-6">
  <div class="bg-white rounded-lg shadow-sm p-6">
    <h2 class="text-xl font-semibold text-gray-800 mb-4">Tạo lịch hẹn mới</h2>
    <form id="bookingForm" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="customerName" class="block text-sm font-medium text-gray-700">Tên khách hàng</label>
          <input type="text" id="customerName" name="customerName" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div>
          <label for="phone" class="block text-sm font-medium text-gray-700">Số điện thoại</label>
          <input type="tel" id="phone" name="phone" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>
      </div>
      
      <div>
        <label for="service" class="block text-sm font-medium text-gray-700">Dịch vụ</label>
        <select id="service" name="service" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
          <option value="">Chọn dịch vụ...</option>
        </select>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label for="date" class="block text-sm font-medium text-gray-700">Ngày</label>
          <input type="date" id="date" name="date" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>
        <div>
          <label for="time" class="block text-sm font-medium text-gray-700">Giờ</habel>
          <input type="time" id="time" name="time" required class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
        </div>
      </div>

      <div>
        <label for="staff" class="block text-sm font-medium text-gray-700">Nhân viên thực hiện</label>
        <select id="staff" name="staff" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
          <option value="">Tự động chọn</option>
        </select>
      </div>

      <div>
        <label for="notes" class="block text-sm font-medium text-gray-700">Ghi chú</label>
        <textarea id="notes" name="notes" rows="3" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500"></textarea>
      </div>

      <div>
        <button type="submit" id="submitBookingBtn" class="w-full inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
          Xác nhận đặt lịch
        </button>
      </div>
    </form>
  </div>
</div>

<script>
  /**
   * Điền danh sách dịch vụ vào dropdown.
   * Dữ liệu giờ đây là một mảng các OBJECT, không phải mảng của mảng.
   */
  function populateServices(services) {
    const select = document.getElementById('service');
    if (!select) return;
    
    // Xóa các lựa chọn cũ
    select.innerHTML = '<option value="">Chọn dịch vụ...</option>';
    
    services.forEach(service => {
      // Thay vì service[1], giờ chúng ta dùng service.name
      // Thay vì service[2], giờ chúng ta dùng service.price
      const option = document.createElement('option');
      option.value = service.name; // Gửi tên dịch vụ về server
      option.textContent = `${service.name} - ${service.price.toLocaleString('vi-VN')} VND`;
      select.appendChild(option);
    });
  }

  /**
   * Điền danh sách nhân viên vào dropdown.
   * Dữ liệu giờ đây là một mảng các OBJECT.
   */
  function populateStaff(staff) {
    const select = document.getElementById('staff');
    if (!select) return;
    
    select.innerHTML = '<option value="">Tự động chọn</option>';

    staff.forEach(s => {
      // Thay vì s[1], giờ chúng ta dùng s.name
      const option = document.createElement('option');
      option.value = s.name;
      option.textContent = s.name;
      select.appendChild(option);
    });
  }

  /**
   * Xử lý việc gửi form đặt lịch.
   */
  function handleBookingSubmit(event) {
    event.preventDefault();
    const btn = document.getElementById('submitBookingBtn');
    btn.disabled = true;
    btn.textContent = 'Đang xử lý...';

    const formData = {
      customerName: document.getElementById('customerName').value,
      phone: document.getElementById('phone').value,
      service: document.getElementById('service').value,
      date: document.getElementById('date').value,
      time: document.getElementById('time').value,
      staff: document.getElementById('staff').value,
      notes: document.getElementById('notes').value
    };

    google.script.run
      .withSuccessHandler(function(response) {
        btn.disabled = false;
        btn.textContent = 'Xác nhận đặt lịch';
        if (response.success) {
          alert('Đặt lịch thành công! ID: ' + response.id);
          document.getElementById('bookingForm').reset();
          // Sau khi đặt lịch thành công, yêu cầu AppCache tải lại dữ liệu mới
          if (window.AppCache && typeof window.AppCache.refresh === 'function') {
            window.AppCache.refresh();
          }
        } else {
          alert('Lỗi khi đặt lịch: ' + response.error);
        }
      })
      .withFailureHandler(function(error) {
        btn.disabled = false;
        btn.textContent = 'Xác nhận đặt lịch';
        alert('Lỗi hệ thống: ' + error.message);
      })
      .createAppointment(formData);
  }

  /**
   * Hàm khởi tạo cho tab này.
   * Được gọi ngay khi tab được tải lên.
   */
  (function initializeBookingTab() {
    console.log("🚀 Initializing Booking Tab...");
    
    // Lấy dữ liệu đã được tải sẵn từ AppCache của index.html
    const appData = window.AppCache ? window.AppCache.getData() : null;

    if (appData) {
      console.log("✅ Found cached data. Populating form fields.");
      populateServices(appData.services || []);
      populateStaff(appData.staff || []);
    } else {
      console.error("❌ Could not get data from AppCache. Form fields will be empty.");
      alert("Không thể tải dữ liệu Dịch vụ và Nhân viên. Vui lòng thử tải lại trang.");
    }
    
    const form = document.getElementById('bookingForm');
    if (form) {
      form.addEventListener('submit', handleBookingSubmit);
    }
  })();
</script>
