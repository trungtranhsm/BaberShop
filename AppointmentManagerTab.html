<script>
(function() {
  const state = { searchQuery: '', dateRange: 'today', currentPage: 1, itemsPerPage: 9, selectedServices: new Set() };

  const listContainer     = document.getElementById('appointment-list');
  const searchInput       = document.getElementById('search-input');
  const paginationCtrls   = document.getElementById('pagination-controls');
  const pageInfo          = document.getElementById('page-info');
  const prevPageBtn       = document.getElementById('prev-page-btn');
  const nextPageBtn       = document.getElementById('next-page-btn');
  const filterControls    = document.getElementById('filter-controls');
  const addBtn            = document.getElementById('add-appointment-btn');
  const addModal          = document.getElementById('add-edit-modal');
  const addForm           = document.getElementById('appointment-form');
  const completeModal     = document.getElementById('complete-appointment-modal');
  const completeForm      = document.getElementById('complete-appointment-form');
  const cancelCompleteBtn = document.getElementById('cancel-complete-btn');
  const cancelModal       = document.getElementById('cancel-appointment-modal');
  const closeCancelBtn    = document.getElementById('close-cancel-modal-btn');
  const confirmCancelBtn  = document.getElementById('confirm-cancel-btn');

  function localDateISO(date = new Date()) {
    return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  }

  function normalizeText(text) {
    return String(text || '').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  }

  // ── Filter & Render ──────────────────────────────────────────
  function filterAndRender() {
    if (!window.AppCache || !window.AppCache.isLoaded) {
      const notReadyMsg = window.currentLanguage === 'vi' ? 'Dữ liệu chưa sẵn sàng...' : 'Data not ready...';
      listContainer.innerHTML = `<div class="col-span-full text-center py-10 text-[#64748B] text-sm">${notReadyMsg}</div>`;
      return;
    }
    let filtered = [...window.AppCache.getData('appointments')];

    if (state.dateRange !== 'all') {
      const today = new Date();
      if (state.dateRange === 'today') {
        filtered = filtered.filter(a => a.date === localDateISO(today));
      } else if (state.dateRange === 'week') {
        const day = today.getDay();
        const diff = today.getDate() - day + (day === 0 ? -6 : 1);
        const start = new Date(today.getFullYear(), today.getMonth(), diff);
        start.setHours(0,0,0,0);
        filtered = filtered.filter(a => new Date(a.date) >= start);
      } else if (state.dateRange === 'month') {
        const start = new Date(today.getFullYear(), today.getMonth(), 1);
        filtered = filtered.filter(a => new Date(a.date) >= start);
      }
    }
    if (state.searchQuery) {
      const q = state.searchQuery.toLowerCase();
      filtered = filtered.filter(a =>
        (a.customerName && a.customerName.toLowerCase().includes(q)) ||
        (a.phone && a.phone.toString().includes(q))
      );
    }
    filtered.sort((a,b) => new Date(b.date+'T'+b.time) - new Date(a.date+'T'+a.time));

    const total = filtered.length;
    const pages = Math.ceil(total / state.itemsPerPage) || 1;
    state.currentPage = Math.min(state.currentPage, pages);
    const start = (state.currentPage - 1) * state.itemsPerPage;
    renderAppointments(filtered.slice(start, start + state.itemsPerPage));
    updatePagination(pages, total > 0);
  }

  function renderAppointments(apts) {
    if (!apts || !apts.length) {
      const noAptsMsg = window.currentLanguage === 'vi' ? 'Không có lịch hẹn nào phù hợp.' : 'No matching appointments.';

      const labelCancel = window.currentLanguage === 'vi' ? 'Hủy' : 'Cancel';

      const actions = canAct ? `

        </button>
        <button data-id="${apt.id}" class="complete-btn flex items-center gap-1.5 px-3 py-1.5 bg-[#22C55E]/15 hover:bg-[#22C55E]/25 text-[#4ADE80] text-xs font-medium rounded-lg cursor-pointer transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>

        <button data-id="${apt.id}" class="cancel-btn flex items-center gap-1.5 px-3 py-1.5 bg-[#EF4444]/15 hover:bg-[#EF4444]/25 text-[#F87171] text-xs font-medium rounded-lg cursor-pointer transition-colors">

          ${labelCancel}
        </button>` : '';

      const card = document.createElement('div');
      card.id = `appointment-card-${apt.id}`;

      const labelServices = window.currentLanguage === 'vi' ? 'Dịch vụ' : 'Services';
      const labelStaff = window.currentLanguage === 'vi' ? 'Nhân viên' : 'Staff';

      card.innerHTML = `
        <div class="flex items-start justify-between gap-2">
          <div class="min-w-0">
            <p class="font-semibold text-sm truncate">${e(apt.customerName) || 'N/A'}</p>
            <p class="text-xs text-[#64748B] mt-0.5">${e(apt.phone)}</p>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="text-sm font-semibold">${e(apt.time)}</p>
            <p class="text-xs text-[#64748B]">${e(apt.date)}</p>
          </div>

        <div class="space-y-1">
          <p class="text-xs text-[#64748B]">${labelServices}: <span class="text-[#F1F5F9] font-medium">${e(apt.service)}</span></p>
          <p class="text-xs text-[#64748B]">${labelStaff}: <span class="text-[#F1F5F9]">${e(apt.staff) || labelUnassigned}</span></p>
        </div>

          <div class="flex gap-2">${actions}</div>
        </div>`;
      listContainer.appendChild(card);
    });
  }

  function updatePagination(totalPages, hasItems) {
    if (hasItems) {
      paginationCtrls.style.display = 'flex';
      const pagePrefix = window.currentLanguage === 'vi' ? 'Trang ' : 'Page ';
      pageInfo.textContent = `${pagePrefix}${state.currentPage} / ${totalPages}`;
      prevPageBtn.disabled = state.currentPage === 1;
      nextPageBtn.disabled = state.currentPage === totalPages;
    } else {
      paginationCtrls.style.display = 'none';
    }
  }

  // ── Helpers ──────────────────────────────────────────────────
  function showAddModal(show = true)      { addModal.style.display     = show ? 'flex' : 'none'; }
  function showCompleteModal(show = true) { completeModal.style.display = show ? 'flex' : 'none'; }
  function showCancelModal(show = true)   { cancelModal.style.display   = show ? 'flex' : 'none'; }

  function setDateRange(range) {
    state.dateRange = range;
    state.currentPage = 1;
    filterControls.querySelectorAll('.filter-btn').forEach(b => {
      const active = b.dataset.range === range;
      b.classList.toggle('bg-[#6366F1]', active);
      b.classList.toggle('text-white', active);
      b.classList.toggle('bg-[#1E1E2A]', !active);
      b.classList.toggle('text-[#94A3B8]', !active);
      b.classList.toggle('border', !active);
      b.classList.toggle('border-[#2A2A38]', !active);
    });
  }

  function ensureCreatedDateVisible(dateValue) {
    if (state.dateRange === 'all') return;
    const today = localDateISO();
    if (dateValue !== today) setDateRange('all');
  }

  function getStaffAllowedServices(staffName) {
    const staff = window.AppCache.getData('staff').find(s => String(s.name || '').trim() === String(staffName || '').trim());
    const specialty = String(staff && staff.specialty || '').trim();
    if (!specialty || normalizeText(specialty) === 'chua co') return null;

    const services = window.AppCache.getData('services');
    const specialtyParts = specialty.split(',').map(s => normalizeText(s)).filter(Boolean);
    const matched = services
      .filter(service => {
        const serviceName = normalizeText(service.name);
        return specialtyParts.some(part => serviceName === part || serviceName.includes(part) || part.includes(serviceName));
      })
      .map(service => service.name);

    return matched.length ? matched : null;
  }

  function populateServicesCheckboxes(listDiv, staffName, selectedServices) {
    const allowed = getStaffAllowedServices(staffName);
    const services = window.AppCache.getData('services').filter(s => !allowed || allowed.includes(s.name));
    const selected = selectedServices || Array.from(state.selectedServices);
    state.selectedServices = new Set(selected.filter(name => services.some(s => s.name === name)));
    listDiv.innerHTML = '';
    if (!services || !services.length) {
      const noAssignedMsg = window.currentLanguage === 'vi' 
        ? 'Nhân viên này chưa được gán dịch vụ/chuyên môn phù hợp.' 
        : 'This staff member is not assigned any matching services/specialties.';
      listDiv.innerHTML = `<p class="text-xs text-[#64748B]">${noAssignedMsg}</p>`;
      return;
    }
    services.forEach(s => {
      listDiv.innerHTML += `
        <label class="flex items-center gap-2 cursor-pointer">
          <input type="checkbox" name="services" value="${s.name}" ${state.selectedServices.has(s.name) ? 'checked' : ''} class="rounded border-[#2A2A38] bg-[#1E1E2A] text-[#6366F1] w-4 h-4">
          <span class="text-sm text-[#F1F5F9]">${s.name}</span>
          <span class="text-xs text-[#64748B] ml-auto">${formatCurrency(s.price)}</span>
        </label>`;
    });
  }

  function populateStaffDropdown(sel) {
    const me = window.AppCache && window.AppCache.currentUser ? window.AppCache.currentUser : null;
    const isAdmin = window.AppCache && window.AppCache.isAdmin && window.AppCache.isAdmin();
    const activeStaff = window.AppCache.getData('staff').filter(s => s.status === 'Đang làm');
    
    const defaultSelectMsg = window.currentLanguage === 'vi' ? 'Chọn nhân viên...' : 'Select staff...';
    sel.innerHTML = `<option value="">${defaultSelectMsg}</option>`;
    
    activeStaff.forEach(s => {
      sel.innerHTML += `<option value="${s.name}">${s.name}</option>`;
    });
    if (me && me.staffName) {
      if (![...sel.options].some(o => o.value === me.staffName)) {
        const opt = document.createElement('option');
        opt.value = me.staffName;
        opt.textContent = me.staffName;
        sel.appendChild(opt);
      }
      sel.value = me.staffName;
    }
    sel.disabled = !isAdmin;
  }

  function setScheduleToNow() {
    const now = new Date();
    const yyyy = now.getFullYear();
    const mm = String(now.getMonth() + 1).padStart(2, '0');
    const dd = String(now.getDate()).padStart(2, '0');
    const hh = String(now.getHours()).padStart(2, '0');
    const mi = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('date').value = `${yyyy}-${mm}-${dd}`;
    document.getElementById('time').value = `${hh}:${mi}`;
  }

  // ── Form Handlers ─────────────────────────────────────────────
  async function handleAddFormSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('save-appointment-btn');
    const selected = Array.from(state.selectedServices);
    if (!selected.length) {
      const selectOneMsg = window.currentLanguage === 'vi' ? 'Vui lòng chọn ít nhất một dịch vụ.' : 'Please select at least one service.';
      showToast(selectOneMsg, 'error'); 
      return; 
    }
    const editingId = document.getElementById('appointment-id').value;
    btn.disabled = true; 
    btn.textContent = window.currentLanguage === 'vi' ? 'Đang lưu...' : 'Saving...';

    const data = {
      customerName: document.getElementById('customerName').value.trim(),
      phone:        document.getElementById('phone').value.trim(),
      date:         document.getElementById('date').value,
      time:         document.getElementById('time').value,
      service:      selected.join(', '),
      staff:        document.getElementById('staff').value,
      notes:        document.getElementById('notes').value
    };

    if (editingId) {
      // === UPDATE FLOW ===
      const idx = window.AppCache.data.appointments.findIndex(a => a.id === editingId);
      const original = idx !== -1 ? { ...window.AppCache.data.appointments[idx] } : null;
      if (idx !== -1) window.AppCache.data.appointments[idx] = { ...original, ...data };
      ensureCreatedDateVisible(data.date);
      filterAndRender();
      showAddModal(false);
      addForm.reset();
      document.getElementById('appointment-id').value = '';
      try {
        const data2 = Object.assign({}, data, { _emailToken: window.AppCache._emailToken });
        const result = await window.AppCache.callServerFunction('updateAppointment', editingId, data2);
        
        const serverErrorMsg = window.currentLanguage === 'vi' ? 'Lỗi server.' : 'Server error.';
        if (!result.success) throw new Error(result.error || serverErrorMsg);
        
        if (idx !== -1) window.AppCache.data.appointments[idx] = result.data;
        filterAndRender();
        
        const successMsg = window.currentLanguage === 'vi' ? 'Đã cập nhật lịch hẹn!' : 'Appointment updated!';
        showToast(successMsg, 'success');
        if (window.updateDashboard) window.updateDashboard();
      } catch (err) {
        const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
        showToast(errorPrefix + err.message, 'error');
        if (idx !== -1 && original) window.AppCache.data.appointments[idx] = original;
        filterAndRender();
      } finally {
        btn.disabled = false; 
        btn.textContent = window.currentLanguage === 'vi' ? 'Lưu lịch hẹn' : 'Save Appointment';
      }
      return;
    }

    // === CREATE FLOW ===
    const tempId = 'temp-' + Date.now();
    window.AppCache.data.appointments.unshift({ ...data, id: tempId, status: 'Đang lưu...' });
    ensureCreatedDateVisible(data.date);
    filterAndRender();
    showAddModal(false);
    addForm.reset();

    try {
      const dataToSend = Object.assign({}, data, { _emailToken: window.AppCache._emailToken });
      const result = await window.AppCache.callServerFunction('createAppointment', dataToSend);
      
      const serverErrorMsg = window.currentLanguage === 'vi' ? 'Lỗi server.' : 'Server error.';
      if (!result.success) throw new Error(result.error || serverErrorMsg);
      
      const idx = window.AppCache.data.appointments.findIndex(a => a.id === tempId);
      if (idx !== -1) window.AppCache.data.appointments[idx] = result.data;
      ensureCreatedDateVisible(result.data && result.data.date ? result.data.date : data.date);
      filterAndRender();
      
      const successMsg = window.currentLanguage === 'vi' ? 'Tạo lịch hẹn thành công!' : 'Appointment created successfully!';
      showToast(successMsg, 'success');
      if (window.updateDashboard) window.updateDashboard();
    } catch (err) {
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + err.message, 'error');
      window.AppCache.data.appointments = window.AppCache.data.appointments.filter(a => a.id !== tempId);
      filterAndRender();
    } finally {
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Lưu lịch hẹn' : 'Save Appointment';
    }
  }

  function openEditAppointment(apt) {
    addForm.reset();
    state.selectedServices.clear();
    phoneDropdown.style.display = 'none';
    
    document.getElementById('modal-title').textContent = window.currentLanguage === 'vi' ? 'Sửa lịch hẹn' : 'Edit Appointment';
    document.getElementById('appointment-id').value = apt.id;
    document.getElementById('customerName').value = apt.customerName || '';
    document.getElementById('phone').value        = apt.phone || '';
    document.getElementById('date').value         = apt.date || '';
    document.getElementById('time').value         = apt.time || '';
    document.getElementById('notes').value        = apt.notes || '';
    // Staff
    const staffSel = document.getElementById('staff');
    populateStaffDropdown(staffSel);
    const canSelectStaff = window.AppCache && window.AppCache.isAdmin && window.AppCache.isAdmin();
    if (apt.staff && canSelectStaff) {
      if (![...staffSel.options].some(o => o.value === apt.staff)) {
        const opt = document.createElement('option');
        opt.value = apt.staff; 
        opt.textContent = apt.staff + (window.currentLanguage === 'vi' ? ' (cũ)' : ' (old)');
        staffSel.appendChild(opt);
      }
      staffSel.value = apt.staff;
    }
    if (!canSelectStaff && window.AppCache && window.AppCache.currentUser && window.AppCache.currentUser.staffName) {
      staffSel.value = window.AppCache.currentUser.staffName;
    }
    const booked = String(apt.service || '').split(',').map(s => s.trim());
    state.selectedServices = new Set(booked);
    populateServicesCheckboxes(document.getElementById('services-checkbox-list'), staffSel.value, booked);
    showAddModal(true);
  }

  async function handleCompleteFormSubmit(e) {
    e.preventDefault();
    const btn = document.getElementById('confirm-complete-btn');
    btn.disabled = true; 
    btn.textContent = window.currentLanguage === 'vi' ? 'Đang xử lý...' : 'Processing...';

    const id = document.getElementById('complete-appointment-id').value;
    const finalServices = Array.from(completeForm.querySelectorAll('input[name="complete_services"]:checked')).map(c => c.value);
    const finalNotes    = document.getElementById('complete-notes').value;

    const idx = window.AppCache.data.appointments.findIndex(a => a.id === id);
    if (idx === -1) { 
      const notFoundMsg = window.currentLanguage === 'vi' ? 'Không tìm thấy lịch hẹn.' : 'Appointment not found.';
      showToast(notFoundMsg, 'error'); 
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Xác nhận hoàn thành' : 'Confirm Completion'; 
      return; 
    }
    
    const original = { ...window.AppCache.data.appointments[idx] };
    window.AppCache.data.appointments[idx] = { ...original, status: 'Hoàn thành', service: finalServices.join(', '), notes: finalNotes };
    filterAndRender();
    showCompleteModal(false);

    try {
      const result = await window.AppCache.callServerFunction('completeAppointment', id, { services: finalServices, notes: finalNotes, _emailToken: window.AppCache._emailToken });
      if (!result.success) throw new Error(result.error);
      
      const successMsg = window.currentLanguage === 'vi' ? 'Đã hoàn thành lịch hẹn!' : 'Appointment completed!';
      showToast(successMsg, 'success');
      if (window.updateDashboard) window.updateDashboard();
      showInvoiceModal(id, finalServices);
    } catch (err) {
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + err.message, 'error');
      window.AppCache.data.appointments[idx] = original;
      filterAndRender();
    } finally {
      btn.disabled = false; 
      btn.textContent = window.currentLanguage === 'vi' ? 'Xác nhận hoàn thành' : 'Confirm Completion';
    }
  }

  async function handleConfirmCancel() {
    const id = document.getElementById('cancel-appointment-id').value;
    if (!id) return;
    const idx = window.AppCache.data.appointments.findIndex(a => a.id === id);
    if (idx === -1) return;
    const original = { ...window.AppCache.data.appointments[idx] };
    window.AppCache.data.appointments[idx] = { ...original, status: 'Đã hủy' };
    filterAndRender();
    showCancelModal(false);

    try {
      const result = await window.AppCache.callServerFunction('cancelAppointment', id, window.AppCache._emailToken);
      if (!result.success) throw new Error(result.error);
      
      const successMsg = window.currentLanguage === 'vi' ? 'Đã hủy lịch hẹn!' : 'Appointment canceled!';
      showToast(successMsg, 'success');
      if (window.updateDashboard) window.updateDashboard();
    } catch (err) {
      const errorPrefix = window.currentLanguage === 'vi' ? 'Lỗi: ' : 'Error: ';
      showToast(errorPrefix + err.message, 'error');
      window.AppCache.data.appointments[idx] = original;
      filterAndRender();
    }
  }

  // ── Events ────────────────────────────────────────────────────
  // ── Phone autocomplete in add modal ──────────────────────────
  const phoneInput      = document.getElementById('phone');
  const nameInput       = document.getElementById('customerName');
  const phoneDropdown   = document.getElementById('phone-autocomplete-dropdown');

  function showPhoneSuggestions(query) {
    const customers = window.AppCache ? window.AppCache.getData('customers') : [];
    const q = query.trim().toLowerCase();
    if (!q || !customers.length) { phoneDropdown.style.display = 'none'; return; }

    const matches = customers.filter(c =>
      String(c.phone).includes(q) || c.name.toLowerCase().includes(q)
    ).slice(0, 6);

    if (!matches.length) { phoneDropdown.style.display = 'none'; return; }

    const ce = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    phoneDropdown.innerHTML = matches.map(c => `
      <div class="phone-suggest-item flex items-center justify-between px-3 py-2.5 hover:bg-[#2A2A38] cursor-pointer transition-colors gap-3"
           data-phone="${ce(c.phone)}" data-name="${ce(c.name)}">
         <div class="flex items-center gap-2 min-w-0">
          <div class="w-6 h-6 rounded-full bg-[#6366F1]/20 flex items-center justify-center flex-shrink-0">
            <svg class="w-3 h-3 text-[#6366F1]" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
            </svg>
          </div>
          <span class="text-sm font-medium truncate">${ce(c.name)}</span>
        </div>
        <span class="text-xs text-[#64748B] font-mono flex-shrink-0">${ce(c.phone)}</span>
      </div>`).join('');
    phoneDropdown.style.display = 'block';
  }

  function hidePhoneDropdown() {
    setTimeout(() => { phoneDropdown.style.display = 'none'; }, 150);
  }

  phoneInput.addEventListener('input', () => showPhoneSuggestions(phoneInput.value));
  phoneInput.addEventListener('blur', hidePhoneDropdown);
  phoneInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') phoneDropdown.style.display = 'none';
  });

  phoneDropdown.addEventListener('click', e => {
    const item = e.target.closest('.phone-suggest-item');
    if (!item) return;
    phoneInput.value = item.dataset.phone;
    nameInput.value  = item.dataset.name;
    phoneDropdown.style.display = 'none';
    nameInput.focus();
  });

  addBtn.addEventListener('click', () => {
    addForm.reset();
    state.selectedServices.clear();
    document.getElementById('appointment-id').value = '';
    phoneDropdown.style.display = 'none';
    document.getElementById('modal-title').textContent = window.currentLanguage === 'vi' ? 'Thêm lịch hẹn mới' : 'Add New Appointment';
    setScheduleToNow();
    populateStaffDropdown(document.getElementById('staff'));
    populateServicesCheckboxes(document.getElementById('services-checkbox-list'), document.getElementById('staff').value);
    showAddModal(true);
    setTimeout(() => phoneInput.focus(), 100);
  });

  [document.getElementById('close-modal-btn'), document.getElementById('close-modal-btn2')].forEach(b => {
    if (b) b.addEventListener('click', () => showAddModal(false));
  });
  document.getElementById('services-checkbox-list').addEventListener('change', e => {
    if (!e.target.matches('input[name="services"]')) return;
    if (e.target.checked) state.selectedServices.add(e.target.value);
    else state.selectedServices.delete(e.target.value);
  });
  addForm.addEventListener('submit', handleAddFormSubmit);
  document.getElementById('staff').addEventListener('change', () => {
    const checked = Array.from(state.selectedServices);
    populateServicesCheckboxes(document.getElementById('services-checkbox-list'), document.getElementById('staff').value, checked);
  });
  completeForm.addEventListener('submit', handleCompleteFormSubmit);
  cancelCompleteBtn.addEventListener('click', () => showCompleteModal(false));
  confirmCancelBtn.addEventListener('click', handleConfirmCancel);
  closeCancelBtn.addEventListener('click', () => showCancelModal(false));

  listContainer.addEventListener('click', e => {
    const btn = e.target.closest('button[data-id]');
    if (!btn) return;
    const id  = btn.dataset.id;
    const apt = window.AppCache.getData('appointments').find(a => a.id === id);
    if (!apt) { 
      const notFoundMsg = window.currentLanguage === 'vi' ? 'Không tìm thấy lịch hẹn!' : 'Appointment not found!';
      showToast(notFoundMsg, 'error'); 
      return; 
    }

    if (String(id).startsWith('temp-') || apt.status === 'Đang lưu...') {
      return;
    }

    if (btn.classList.contains('edit-btn')) {
      openEditAppointment(apt);
      return;
    }
    if (btn.classList.contains('complete-btn')) {
      document.getElementById('complete-appointment-id').value = apt.id;
      document.getElementById('complete-customer-info').textContent = `${apt.customerName} — ${apt.phone}`;
      document.getElementById('complete-notes').value = apt.notes || '';
      const allowed = getStaffAllowedServices(apt.staff);
      const allServices = window.AppCache.getData('services').filter(s => !allowed || allowed.includes(s.name));
      const bookedServices = apt.service.split(',').map(s => s.trim());
      const listDiv = document.getElementById('complete-services-list');
      listDiv.innerHTML = '';
      allServices.forEach(s => {
        const checked = bookedServices.includes(s.name);
        listDiv.innerHTML += `
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" name="complete_services" value="${s.name}" ${checked ? 'checked' : ''} class="rounded border-[#2A2A38] bg-[#1E1E2A] text-[#22C55E] w-4 h-4">
            <span class="text-sm">${s.name}</span>
          </label>`;
      });
      showCompleteModal(true);
    }
    if (btn.classList.contains('cancel-btn')) {
      document.getElementById('cancel-appointment-id').value = apt.id;
      const ce = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      
      const confirmQuestionHtml = window.currentLanguage === 'vi'
        ? `Bạn có chắc muốn hủy lịch hẹn của <strong>${ce(apt.customerName)}</strong> vào lúc <strong>${ce(apt.time)} ngày ${ce(apt.date)}</strong>?`
        : `Are you sure you want to cancel the appointment for <strong>${ce(apt.customerName)}</strong> at <strong>${ce(apt.time)} on ${ce(apt.date)}</strong>?`;
      
      document.getElementById('cancel-confirmation-text').innerHTML = confirmQuestionHtml;
      showCancelModal(true);
    }
  });

  searchInput.addEventListener('input', e => {
    const captured = e.target.value;
    setTimeout(() => {
      if (captured === searchInput.value) {
        state.searchQuery = captured;
        state.currentPage = 1;
        filterAndRender();
      }
    }, 300);
  });

  filterControls.addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    setDateRange(btn.dataset.range);
    filterAndRender();
  });

  prevPageBtn.addEventListener('click', () => { if (state.currentPage > 1) { state.currentPage--; filterAndRender(); } });
  nextPageBtn.addEventListener('click', () => { state.currentPage++; filterAndRender(); });

  function showInvoiceModal(aptId, servicesList) {
    const apt = (window.AppCache.getData('appointments') || []).find(a => String(a.id) === String(aptId));
    if (!apt) return;

    // Load settings
    const settings = (window.AppCache.data && window.AppCache.data.systemSettings) || {};
    
    // Fill shop info
    document.getElementById('invoice-shop-name').textContent = settings.shop_name || 'Barber Shop';
    document.getElementById('invoice-shop-address').textContent = settings.shop_address || '';
    document.getElementById('invoice-shop-phone').textContent = settings.shop_phone || '';

    // Fill customer / booking info
    document.getElementById('invoice-cust-name').textContent = apt.customerName || '';
    document.getElementById('invoice-cust-phone').textContent = apt.phone || '';
    
    // Format date & time nicely
    let timeStr = apt.time || '';
    if (apt.date) {
      const parts = apt.date.split('-');
      if (parts.length === 3) {
        timeStr += ` (${parts[2]}/${parts[1]}/${parts[0]})`;
      }
    }
    document.getElementById('invoice-apt-time').textContent = timeStr;
    document.getElementById('invoice-staff-name').textContent = apt.staffName || '';

    // Fill service list and calculate total
    const servicesData = window.AppCache.getData('services') || [];
    const servicePriceMap = {};
    servicesData.forEach(s => {
      const name = s.name || s[1];
      const price = Number(s.price || s[2] || 0);
      if (name) servicePriceMap[name.trim()] = price;
    });

    let total = 0;
    const tbody = document.getElementById('invoice-services-body');
    tbody.innerHTML = '';
    
    servicesList.forEach(srvName => {
      const trimmed = srvName.trim();
      const price = servicePriceMap[trimmed] || 0;
      total += price;

      const tr = document.createElement('tr');
      tr.className = 'border-b border-[#2A2A38]/50';
      
      const tdName = document.createElement('td');
      tdName.className = 'py-2';
      tdName.textContent = trimmed;
      
      const tdPrice = document.createElement('td');
      tdPrice.className = 'py-2 text-right font-medium text-[#4ADE80]';
      tdPrice.textContent = price.toLocaleString('vi-VN') + ' đ';
      
      tr.appendChild(tdName);
      tr.appendChild(tdPrice);
      tbody.appendChild(tr);
    });

    document.getElementById('invoice-total-amount').textContent = total.toLocaleString('vi-VN') + ' đ';

    // VietQR code generation
    const vietqrSection = document.getElementById('invoice-vietqr-section');
    const bankId = settings.bank_id;
    const accountNo = settings.account_no;
    const accountName = settings.account_name;

    if (bankId && accountNo && accountName) {
      vietqrSection.style.display = 'flex';
      
      // Update Bank details text
      const bankLabel = window.currentLanguage === 'vi' ? 'Ngân hàng' : 'Bank';
      const accLabel = window.currentLanguage === 'vi' ? 'STK' : 'Acc';
      const nameLabel = window.currentLanguage === 'vi' ? 'Chủ TK' : 'Holder';
      document.getElementById('invoice-bank-details').textContent = `${bankLabel}: ${bankId} | ${accLabel}: ${accountNo} | ${nameLabel}: ${accountName}`;
      
      // Generate description: e.g. "TT HD APT 123"
      const description = `TT HD APT ${apt.id || ''}`.toUpperCase();
      
      // URL format: https://img.vietqr.io/image/<BANK_ID>-<ACCOUNT_NO>-compact2.png?amount=<AMOUNT>&addInfo=<DESCRIPTION>&accountName=<ACCOUNT_NAME>
      const bankIdEncoded = encodeURIComponent(bankId);
      const accountNoEncoded = encodeURIComponent(accountNo);
      const amountEncoded = total;
      const descEncoded = encodeURIComponent(description);
      const accountNameEncoded = encodeURIComponent(accountName);
      
      const qrUrl = `https://img.vietqr.io/image/${bankIdEncoded}-${accountNoEncoded}-compact2.png?amount=${amountEncoded}&addInfo=${descEncoded}&accountName=${accountNameEncoded}`;
      document.getElementById('invoice-vietqr-img').src = qrUrl;
    } else {
      vietqrSection.style.display = 'none';
    }

    // Display modal
    document.getElementById('invoice-modal').style.display = 'flex';
  }

  window.hideInvoiceModal = function() {
    document.getElementById('invoice-modal').style.display = 'none';
  };

  window.printInvoice = function() {
    document.body.classList.add('printing-invoice');
    window.print();
  };

  window.addEventListener('afterprint', () => {
    document.body.classList.remove('printing-invoice');
  });

  window.initAppointmentManagerTab = function() {
    if (window.AppCache && window.AppCache.isLoaded) filterAndRender();
  };
})();
</script>
